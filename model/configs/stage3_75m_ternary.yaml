# BNAI V1.0 ("Benny") -- Parameter ladder Stage 3 (~75M params), ternary.
# This is the original spec's design point (14 layers, d_model 576),
# reused here as a ladder checkpoint on the way to the 125M ceiling rather
# than the project's sole target. See docs/model_card.md for the ladder
# rationale.

model:
  # 74,187,072 params (exact match -- this is the original design point).
  vocab_size: 32000
  d_model: 576
  n_layers: 14
  n_heads: 9
  ffn_hidden: 1536
  context_len: 2048
  act_bits: 8
  ternary_weights: true

training:
  # 74,187,072 params x 20 tokens/param ~= 1.484B tokens.
  target_tokens: 1_484_000_000
  effective_batch_tokens: 524_288
  micro_batch_size: 8
  peak_lr: 3.0e-4
  warmup_fraction: 0.02
  min_lr_fraction: 0.10
  adam_beta1: 0.9
  adam_beta2: 0.95
  weight_decay: 0.1
  grad_clip_norm: 1.0
  amp_dtype: bfloat16
  log_interval_steps: 10
  checkpoint_interval_steps: 250
  export_interval_steps: 1000

data:
  train_dataset: "HuggingFaceFW/fineweb-edu"
  train_split: "train"
  text_field: "text"
  val_fraction: 0.008

output_dir: "checkpoints/stage3_75m_ternary"
