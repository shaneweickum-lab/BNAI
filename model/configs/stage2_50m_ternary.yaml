# BNAI V1.0 ("Benny") -- Parameter ladder Stage 2 (~50M params), ternary.
# Purpose: first quality scale-up after Stage 1 validates the pipeline.
# See docs/model_card.md for the full 25M->50M->75M->125M ladder rationale.

model:
  # 49,900,160 params (-0.20% of the 50M target). vocab raised to 16K (top
  # of the spec's 8K-16K guidance) since there's more budget headroom than
  # Stage 1 -- head_dim stays 64.
  vocab_size: 16000
  d_model: 640
  n_layers: 8
  n_heads: 10
  ffn_hidden: 1728
  context_len: 2048
  act_bits: 8
  ternary_weights: true

training:
  # 49,900,160 params x 20 tokens/param ~= 998M tokens.
  target_tokens: 998_000_000
  effective_batch_tokens: 524_288
  micro_batch_size: 8
  peak_lr: 3.0e-4
  warmup_fraction: 0.02
  min_lr_fraction: 0.10
  adam_beta1: 0.9
  adam_beta2: 0.95
  weight_decay: 0.1
  grad_clip_norm: 1.0
  amp_dtype: bfloat16
  log_interval_steps: 10
  checkpoint_interval_steps: 250
  export_interval_steps: 1000

data:
  train_dataset: "HuggingFaceFW/fineweb-edu"
  train_split: "train"
  text_field: "text"
  val_fraction: 0.008

output_dir: "checkpoints/stage2_50m_ternary"
