# BNAI V1.0 ("Benny") -- Parameter ladder Stage 1 (~25M params), fp16 baseline.
# Identical architecture/recipe to stage1_25m_ternary.yaml except
# ternary_weights: false, for the Section 6 quantization-cost comparison.

model:
  vocab_size: 10000
  d_model: 384
  n_layers: 12
  n_heads: 6
  ffn_hidden: 1024
  context_len: 2048
  act_bits: 8
  ternary_weights: false

training:
  target_tokens: 501_700_000
  effective_batch_tokens: 524_288
  micro_batch_size: 8
  peak_lr: 3.0e-4
  warmup_fraction: 0.02
  min_lr_fraction: 0.10
  adam_beta1: 0.9
  adam_beta2: 0.95
  weight_decay: 0.1
  grad_clip_norm: 1.0
  amp_dtype: bfloat16
  log_interval_steps: 10
  checkpoint_interval_steps: 250
  export_interval_steps: 1000000  # fp16 baseline is never exported to .bnai (ternary-only format)

data:
  train_dataset: "HuggingFaceFW/fineweb-edu"
  train_split: "train"
  text_field: "text"
  val_fraction: 0.008

output_dir: "checkpoints/stage1_25m_fp16_baseline"
