# Tiny config for exercising train.py's mechanics (checkpointing, resume,
# logging, periodic export) quickly on any machine, including CPU-only CI --
# NOT a stand-in for the real Phase 3 M5/MPS throughput smoke test, which
# must use base_ternary.yaml's full architecture to produce a meaningful
# tokens/sec number.

model:
  vocab_size: 512
  d_model: 64
  n_layers: 2
  n_heads: 4
  ffn_hidden: 128
  context_len: 64
  act_bits: 8
  ternary_weights: true

training:
  target_tokens: 200_000
  effective_batch_tokens: 2048
  micro_batch_size: 4
  peak_lr: 3.0e-4
  warmup_fraction: 0.1
  min_lr_fraction: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  weight_decay: 0.1
  grad_clip_norm: 1.0
  amp_dtype: bfloat16
  log_interval_steps: 5
  checkpoint_interval_steps: 20
  export_interval_steps: 20

data:
  train_dataset: "unused-for-local-corpus-runs"
  val_fraction: 0.05

output_dir: "checkpoints/smoke_test"
