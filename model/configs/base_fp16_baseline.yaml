# BNAI V1.0 ("Benny") -- fp16 baseline, identical architecture and recipe to
# base_ternary.yaml except ternary_weights: false. Trained on the same
# data/token budget so the ternary-vs-fp16 comparison (spec Section 6) isolates
# the cost of quantization from every other variable.

model:
  vocab_size: 32000
  d_model: 768
  n_layers: 14
  n_heads: 12
  ffn_hidden: 2048
  context_len: 2048
  act_bits: 8
  ternary_weights: false

training:
  target_tokens: 2_470_000_000
  effective_batch_tokens: 524_288
  micro_batch_size: 8
  peak_lr: 3.0e-4
  warmup_fraction: 0.02
  min_lr_fraction: 0.10
  adam_beta1: 0.9
  adam_beta2: 0.95
  weight_decay: 0.1
  grad_clip_norm: 1.0
  amp_dtype: bfloat16
  log_interval_steps: 10
  checkpoint_interval_steps: 250
  export_interval_steps: 1000

data:
  train_dataset: "HuggingFaceFW/fineweb-edu"
  train_split: "train"
  text_field: "text"
  val_fraction: 0.008

output_dir: "checkpoints/base_fp16_baseline"
